name: HSE Crawler

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 工作日 9:00 UTC+8
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run crawler
      run: node crawler.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}